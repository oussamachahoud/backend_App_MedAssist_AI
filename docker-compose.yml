version: '3.8'

services:
  medassist-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medassist_api
    ports:
      - "8000:8000"
    environment:
      - MALLOC_ARENA_MAX=2
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    # ── Memory Limit (4GB Constraint) ─────────────────
    # If the container exceeds 3.5GB, Docker will kill and restart it,
    # preventing the host VPS from freezing (OOM lockup).
    deploy:
      resources:
        limits:
          memory: 3.5G
    restart: unless-stopped
