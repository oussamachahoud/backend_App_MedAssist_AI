version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin_lesion_api
    image: skin-lesion-api:latest

    # ── Environment ───────────────────────────────────────
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000

    # ── Ports ─────────────────────────────────────────────
    ports:
      - "8000:8000"

    # ── Volumes ───────────────────────────────────────────
    volumes:
      # Mount model files from host (not baked into image)
      - ./app/ml_models:/app/app/ml_models:ro
      # Persist logs
      - ./logs:/app/logs

    # ── Health check ──────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # ── Restart policy ────────────────────────────────────
    restart: unless-stopped

    # ── Resource limits ───────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
